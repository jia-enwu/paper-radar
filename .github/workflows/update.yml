name: Daily Paper Radar update

on:
  schedule:
    - cron: "0 22 * * *"   # UTC 22:00 = 6:00 AM Taipei time
  workflow_dispatch:        # can also be triggered manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and score
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 fetch_and_score.py

      - name: Commit update
        run: |
          git config user.name "paper-radar-bot"
          git config user.email "actions@github.com"
          git add docs/papers.json
          git diff --cached --quiet || git commit -m "auto-update papers.json ($(date -u +%F))"
          git push
